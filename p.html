<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прости меня дурака</title>
    <style>
        /* МИНИМАЛЬНЫЙ ДИЗАЙН — только тёмный фон и свечение */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
        }

        /* ТОЛЬКО ОДНА ФРАЗА — светящийся текст */
        .glow-text {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 5px #ffaa33, 0 0 10px #ffaa33, 0 0 20px #ff6600;
            animation: pulse 1.5s infinite alternate;
            padding: 20px;
            letter-spacing: 2px;
        }

        /* Лёгкая пульсация свечения */
        @keyframes pulse {
            0% { text-shadow: 0 0 5px #ffaa33, 0 0 10px #ff9900, 0 0 15px #ff6600; }
            100% { text-shadow: 0 0 12px #ffcc66, 0 0 25px #ffaa33, 0 0 35px #ff5500; }
        }

        /* Для мобильных — чуть меньше текст */
        @media (max-width: 600px) {
            .glow-text {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="glow-text">
        ПРОСТИ МЕНЯ ДУРАКА
    </div>
</body>
</html>
